language: "ko-KR"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false

  # TODO: 멀티 모듈로 수정 후 경로 변경
  path_filters:
    - "!.coderabbit.yml"
    - "!.github/**"
    - "!build/**"
    - "!gradle/**"
    - "**/domain/*.java"
    - "**/application/*.java"

  path_instructions:
    - path: "**/*.java"
      instructions: |
        - 'var' 사용을 발견하면 즉시 수정 제안을 하세요. (명시적 타입 사용 원칙)
        - @Data 어노테이션 사용을 지양하고 불변 객체(Getter, 생성자 주입) 설계를 권장하세요.

    - path: "**/domain/**/*.java"
      instructions: |
        - 비즈니스 로직이 서비스 레이어로 유출되었는지(Anemic Domain Model) 엄격히 검사하세요.
        - 도메인 엔티티는 스스로의 상태를 보호하는 'Rich Domain Model'이어야 합니다.
        - DTO가 domain 패키지에 위치한다면 지적하세요.

    - path: "**/dto/**/*.java"
      instructions: |
        - 모든 DTO 클래스는 'Request' 또는 'Response' 접미사를 가져야 합니다. (예: CreateUserRequest)

    - path: "**/src/test/**/*.java"
      instructions: |
        - 테스트 메서드 명은 반드시 **영문 CamelCase**로 작성되어야 합니다.
        - 테스트 코드는 가독성을 위해 120줄을 초과해도 지적하지 마세요.

tone_instructions: |
  우아한테크코스 크루들을 위한 'moylog' 프로젝트의 시니어 리뷰어입니다. 
  단순히 코드 문법을 넘어 아키텍처와 객체지향 원칙을 중심으로 리뷰해주세요.
  도메인 모델, 객체지향 원칙, TDD(시나리오)를 최우선으로 하며, ownership을 가지고 엣지 케이스를 고민했는지 확인합니다. 
  친근하지만 코드 퀄리티와 설계 결함에는 타협 없는 깐깐한 선배 크루 및 코치의 단호한 톤을 유지하세요.

knowledge_base:
  learnings:
    scope: "auto"
  code_guidelines:
    enabled: true
    filePatterns:
      - "CONVENTION.md"            # 프로젝트 기본 컨벤션
      - ".gemini/styleguide.md"    # 세부 스타일 가이드
      - ".gemini/context.md"       # 비즈니스 배경지식

chat:
  auto_reply: true

enable_free_tier: true