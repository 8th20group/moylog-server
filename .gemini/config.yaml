disable: false
max_review_comments: 15
comment_severity_threshold: "MEDIUM"

# 자동 리뷰 기능을 모두 비활성화 (수동 전용)
pull_request_opened:
  summary: false
  code_review: false

pull_request_updated:
  summary: false
  code_review: false

# 수동 호출 - PR 댓글에 "@gemini-assist review" 라고 칠 때만 작동
commands:
  review:
    enable: true
    comment_severity_threshold: "LOW"

ignore_patterns:
  - "build/**"
  - "gradle/**"
focus_patterns:
  # 멀티 모듈 설계 후 개선 - 기본 도메인 (가장 우선순위)
  - "**/domain/**/*.java"
  - "**/application/**/*.java"

instructions: |
  리뷰를 시작하기 전에 프로젝트 루트에 있는 'CONVENTION.md' 파일을 반드시 먼저 정독하세요.
  모든 코드 리뷰는 해당 파일에 정의된 규칙(명명 규칙, 테스트 코드 작성법, 원칙 등)을 최우선으로 따릅니다.
  만약 코드에서 'CONVENTION.md'를 위반한 사례가 발견되면 지체 없이 지적해 주세요.
  특히 'var 사용 금지'나 '테스트 메서드 영어 작성' 같은 세부 규칙을 엄격하게 감시하세요.